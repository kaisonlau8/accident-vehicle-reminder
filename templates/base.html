<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}事故车提醒系统{% endblock %}</title>
  <style>
    :root {
      --blue: #3370ff;
      --orange: #ff8800;
      --red: #f5222d;
      --yellow: #fadb14;
      --turquoise: #00b578;
      --gray: #8f959e;
      --bg: #f5f5f5;
      --card-bg: #fff;
      --text: #1f2329;
      --border: #dee0e3;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; }
    .nav { background: var(--card-bg); border-bottom: 1px solid var(--border); padding: 12px 24px; display: flex; align-items: center; gap: 24px; }
    .nav h1 { font-size: 18px; font-weight: 600; color: var(--blue); }
    .nav a { color: var(--text); text-decoration: none; font-size: 14px; padding: 6px 12px; border-radius: 4px; }
    .nav a:hover { background: var(--bg); color: var(--blue); }
    .container { max-width: 960px; margin: 24px auto; padding: 0 16px; }
    .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 8px; padding: 20px; margin-bottom: 16px; }
    .card h2 { font-size: 16px; font-weight: 600; margin-bottom: 12px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; }
    .stat { padding: 16px; background: var(--card-bg); border: 1px solid var(--border); border-radius: 8px; text-align: center; }
    .stat .num { font-size: 24px; font-weight: 700; color: var(--blue); }
    .stat .label { font-size: 13px; color: var(--gray); }
    .btn { display: inline-block; padding: 8px 16px; border: none; border-radius: 4px; font-size: 14px; cursor: pointer; text-decoration: none; text-align: center; }
    .btn-primary { background: var(--blue); color: #fff; }
    .btn-primary:hover { background: #2860e0; }
    .btn-warning { background: var(--orange); color: #fff; }
    .btn-warning:hover { background: #e07800; }
    .btn-danger { background: var(--red); color: #fff; }
    .btn-danger:hover { background: #d41d25; }
    .btn-success { background: var(--turquoise); color: #fff; }
    .btn-success:hover { background: #00a06b; }
    .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
    .btn-outline:hover { border-color: var(--blue); color: var(--blue); }
    .btn-sm { padding: 4px 10px; font-size: 13px; }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th { background: var(--bg); text-align: left; padding: 8px 12px; font-weight: 600; border-bottom: 2px solid var(--border); }
    td { padding: 8px 12px; border-bottom: 1px solid var(--border); }
    tr:hover td { background: #f8f9fa; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 12px; font-weight: 500; }
    .badge-yellow { background: #fffbe6; color: #ad6800; }
    .badge-orange { background: #fff2e8; color: #c46a10; }
    .badge-red { background: #fff1f0; color: #cf1322; }
    .badge-blue { background: #e8f3ff; color: var(--blue); }
    .badge-green { background: #e8f8ee; color: var(--turquoise); }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 14px; font-weight: 500; margin-bottom: 4px; }
    .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 8px 12px; border: 1px solid var(--border); border-radius: 4px; font-size: 14px; }
    .form-group textarea { resize: vertical; min-height: 80px; }
    .form-row { display: flex; gap: 16px; align-items: center; }
    .form-row .form-group { flex: 1; }
    .checkbox { display: flex; align-items: center; gap: 6px; }
    .checkbox input[type=checkbox] { width: 16px; height: 16px; }
    .log-box { background: #1f2329; color: #e8e8e8; padding: 16px; border-radius: 8px; font-family: monospace; font-size: 13px; max-height: 400px; overflow-y: auto; white-space: pre-wrap; }
    .mode-indicator { display: inline-block; padding: 4px 12px; border-radius: 12px; font-size: 13px; font-weight: 500; }
    .mode-idle { background: var(--bg); color: var(--gray); }
    .mode-test { background: #fffbe6; color: #ad6800; }
    .mode-prod { background: #e8f8ee; color: var(--turquoise); }
    .alert-yellow { border-left: 4px solid var(--yellow); }
    .alert-orange { border-left: 4px solid var(--orange); }
    .alert-red { border-left: 4px solid var(--red); }
    footer { text-align: center; padding: 16px; color: var(--gray); font-size: 13px; }
    .running { animation: pulse 1.5s ease-in-out infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .5; } }
  </style>
</head>
<body>
  <nav class="nav">
    <h1>事故车提醒系统</h1>
    <a href="/">仪表盘</a>
    <a href="/mode">模式切换</a>
    <a href="/trigger">手动触发</a>
    <a href="/rules">规则管理</a>
    <a href="/data">数据查看</a>
    <a href="/reports">报表下载</a>
    <a href="/contacts">门店联系人</a>
    <a href="/clear-cache" style="color:var(--red);">清除缓存</a>
    <span style="margin-left:auto;">
      当前模式:
      {% if mode == 'test' %}
        <span class="mode-indicator mode-test">测试</span>
      {% elif mode == 'scheduled' %}
        <span class="mode-indicator mode-prod">定时等候</span>
      {% elif mode == 'prod' %}
        <span class="mode-indicator mode-prod">正式</span>
      {% else %}
        <span class="mode-indicator mode-idle">未启动</span>
      {% endif %}
    </span>
  </nav>
  <div class="container">
    {% block content %}{% endblock %}
  </div>
  <footer>猛士科技 服务运营 — 事故车维修超期提醒系统</footer>
</body>
</html>
